version: "3.9"

networks:
  rag_network:
    driver: bridge

volumes:
  qdrant_data:
  minio_data:
  postgres_data:

services:
  # ---------------------------------------------------------------------------
  # Vector Store — Qdrant
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_network
    # No healthcheck needed — qdrant/qdrant image has no curl/wget
    # The backend startup_validation.py handles waiting for Qdrant to be ready

  # ---------------------------------------------------------------------------
  # Object Storage — MinIO
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Metadata Store — PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Backend API — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # OpenRouter / LLM
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Cohere / Jina reranking
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      # Qdrant (internal Docker DNS or Qdrant Cloud)
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      # MinIO (internal Docker DNS)
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      DISABLE_MINIO: ${DISABLE_MINIO:-false}
      # PostgreSQL (internal Docker DNS)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpassword}@postgres:5432/${POSTGRES_DB:-ragdb}
      # Frontend CORS origin
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      # Configuration directory
      CONFIG_DIR: ${CONFIG_DIR:-/app/config}
    volumes:
      - ./backend/config:/app/config:ro
    networks:
      - rag_network
    depends_on:
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # If a dependent service fails to start, Docker will log the failure and
    # the backend container will exit with a non-zero status code (req 8.6).
