[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; ---------------------------------------------------------------------------
; PostgreSQL
; ---------------------------------------------------------------------------
[program:postgres]
command=/usr/lib/postgresql/15/bin/pg_ctl start -D /var/lib/postgresql/15/main -l /var/log/postgresql/postgresql.log -w
user=postgres
autostart=true
autorestart=false
startsecs=5
priority=10
stdout_logfile=/var/log/supervisor/postgres.log
stderr_logfile=/var/log/supervisor/postgres_err.log

; ---------------------------------------------------------------------------
; Qdrant Vector Database
; ---------------------------------------------------------------------------
[program:qdrant]
command=/usr/local/bin/qdrant --storage-path /qdrant_storage
autostart=true
autorestart=true
startsecs=5
priority=20
environment=QDRANT__SERVICE__HTTP_PORT=6333
stdout_logfile=/var/log/supervisor/qdrant.log
stderr_logfile=/var/log/supervisor/qdrant_err.log

; ---------------------------------------------------------------------------
; FastAPI Backend (waits for postgres + qdrant to be ready)
; ---------------------------------------------------------------------------
[program:backend]
command=bash -c "sleep 8 && uvicorn app.main:app --host 0.0.0.0 --port 7860 --workers 1"
directory=/app/backend
autostart=true
autorestart=true
startsecs=15
priority=30
stdout_logfile=/var/log/supervisor/backend.log
stderr_logfile=/var/log/supervisor/backend_err.log
